version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terraforge_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./terraform:/terraform
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - terraforge_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terraforge_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - terraforge_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: terraforge_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - terraforge_net
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15
    container_name: terraforge_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - terraforge_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: terraforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - terraforge_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  terraforge_net:
    driver: bridge
